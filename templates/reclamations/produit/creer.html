{% extends 'base.html' %}

{% block title %}Nouveau Produit{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Nouveau Produit</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="product_number" class="form-label">Numéro produit *</label>
                            <input type="text" class="form-control" id="product_number" name="product_number" required autofocus>
                            <div class="form-text">Référence unique du produit</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="designation" class="form-label">Désignation</label>
                            <input type="text" class="form-control" id="designation" name="designation">
                            <div class="form-text">Description courte du produit</div>
                        </div>
                        
                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="actif" name="actif" checked>
                                <label class="form-check-label" for="actif">
                                    Produit actif
                                </label>
                            </div>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Créer
                            </button>
                            <a href="{% url 'reclamations:liste_produits' %}" class="btn btn-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
