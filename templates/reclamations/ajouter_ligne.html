{% extends 'base.html' %}

{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
<style>
    .select2-container--default .select2-selection--single {
        height: 38px;
        border: 1px solid #ced4da;
        border-radius: 0.25rem;
    }
    .select2-container--default .select2-selection--single .select2-selection__rendered {
        line-height: 38px;
    }
    .select2-container--default .select2-selection--single .select2-selection__arrow {
        height: 36px;
    }
    .select2-dropdown {
        z-index: 1050;
    }
    .select2-container--default .select2-results__option--highlighted[aria-selected] {
        background-color: #007bff;
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Ajouter un produit</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="produit" class="form-label">Produit *</label>
                        <select class="form-control" id="produit" name="produit" style="width: 100%;" required>
                            <option value="">Rechercher un produit...</option>
                        </select>
                        <div class="form-text mt-2">
                            <i class="fas fa-info-circle"></i> 
                            Saisissez au moins 2 caractères pour rechercher (numéro produit ou désignation)
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script>
$(document).ready(function() {
    $('#produit').select2({
        ajax: {
            url: "{% url 'reclamations:recherche_produits' %}",
            dataType: 'json',
            delay: 300,
            type: 'GET',
            data: function(params) {
                console.log('Paramètres de recherche:', params);
                return {
                    term: params.term || '',
                    page: params.page || 1
                };
            },
            processResults: function(data, params) {
                console.log('Résultats reçus:', data);
                params.page = params.page || 1;
                
                return {
                    results: data.results,
                    pagination: {
                        more: data.pagination.more
                    }
                };
            },
            cache: true
        },
        placeholder: 'Tapez au moins 2 caractères pour rechercher...',
        minimumInputLength: 2,
        allowClear: true,
        width: '100%',
        language: {
            inputTooShort: function(args) {
                var remaining = args.minimum - args.input.length;
                return "Saisissez " + remaining + " caractère(s) supplémentaire(s)";
            },
            noResults: function() {
                return "Aucun produit trouvé";
            },
            searching: function() {
                return "Recherche en cours...";
            },
            errorLoading: function() {
                return "Erreur de chargement";
            }
        },
        escapeMarkup: function(markup) {
            return markup;
        }
    });
    
    // Écouter l'événement de changement
    $('#produit').on('change', function() {
        console.log('Produit sélectionné:', $(this).val());
    });
});
</script>
{% endblock %}
