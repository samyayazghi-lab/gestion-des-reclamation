{% extends 'base.html' %}

{% block title %}Nouveau Site{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Nouveau Site</h5>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="nom" class="form-label">Nom du site *</label>
                            <input type="text" class="form-control" id="nom" name="nom" required autofocus>
                            <div class="form-text">Exemple: Site de Paris, Site de Lyon, etc.</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="uap" class="form-label">UAP *</label>
                            <select class="form-control" id="uap" name="uap" required>
                                <option value="">Sélectionnez une UAP</option>
                                {% for uap in uaps %}
                                <option value="{{ uap.id }}">{{ uap.nom }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="text-center">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Créer
                            </button>
                            <a href="{% url 'reclamations:liste_sites' %}" class="btn btn-secondary">
                                Annuler
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
